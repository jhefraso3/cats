<div class="login-container">
  <form [formGroup]="registerForm" (ngSubmit)="register()" class="login-card">
    <h2 class="title">Crear cuenta</h2>

    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input
        type="text"
        class="form-control"
        formControlName="firstName"
        placeholder="Ingrese su nombre"
      />
    </div>
    <div class="mb-3">
      <label class="form-label">Apellido</label>
      <input
        type="text"
        class="form-control"
        formControlName="lastName"
        placeholder="Ingrese su apellido"
      />
    </div>
    <div class="mb-3">
      <label class="form-label">Usuario</label>
      <input
        type="text"
        class="form-control"
        formControlName="username"
        placeholder="Ingrese su usuario"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input
        type="password"
        class="form-control"
        formControlName="password"
        placeholder="Ingrese su contraseña"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Confirmar contraseña</label>
      <input
        type="password"
        class="form-control"
        formControlName="confirmPassword"
        placeholder="Confirme su contraseña"
      />
    </div>

    <button class="btn btn-login w-100" [disabled]="loading" type="submit">
      {{ loading ? "Creando cuenta..." : "Registrar" }}
    </button>

    <div class="text-center mt-3">
      <a class="text-create" routerLink="/login">Volver al login</a>
    </div>
  </form>
</div>
