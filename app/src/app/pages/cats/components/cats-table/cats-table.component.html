<div class="container">
  <h2>Listado completo de razas</h2>

  <mat-form-field appearance="outline" class="w-100 mb-3">
    <mat-label>Buscar</mat-label>
    <input
      matInput
      (keyup)="applyTableFilter($event)"
      placeholder="Buscar raza..."
    />
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let b">{{ b.name }}</td>
    </ng-container>

    <ng-container matColumnDef="origin">
      <th mat-header-cell *matHeaderCellDef>Origen</th>
      <td mat-cell *matCellDef="let b">{{ b.origin }}</td>
    </ng-container>

    <ng-container matColumnDef="temperament">
      <th mat-header-cell *matHeaderCellDef>Temperamento</th>
      <td mat-cell *matCellDef="let b">{{ b.temperament }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  ></mat-paginator>
</div>
