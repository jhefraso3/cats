<div class="user-container">
  <mat-card class="user-card">
    <h2>Perfil de Usuario</h2>

    <div class="user-row">
      <span>Nombre:</span>
      <p>{{ user?.firstName }}</p>
    </div>

    <div class="user-row">
      <span>Apellido:</span>
      <p>{{ user?.lastName }}</p>
    </div>

    <div class="user-row">
      <span>Usuario:</span>
      <p>{{ user?.username }}</p>
    </div>
  </mat-card>
</div>
